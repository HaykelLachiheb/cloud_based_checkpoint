name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm run install:all

      - name: Lint server
        run: npx tsc --noEmit
        working-directory: ./server

      - name: Build client
        run: npm run build
        working-directory: ./client

      - name: Build server
        run: npm run build
        working-directory: ./server
