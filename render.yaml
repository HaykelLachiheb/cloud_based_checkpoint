services:
  - type: web
    name: clinicflow
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm install --include=dev --prefix server && npm install --include=dev --prefix client && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
