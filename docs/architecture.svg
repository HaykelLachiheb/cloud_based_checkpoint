<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">ClinicFlow — System Architecture</text>

  <!-- ============= Presentation Tier ============= -->
  <rect x="50" y="60" width="800" height="160" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="70" y="85" font-size="14" font-weight="bold" fill="#1d4ed8">PRESENTATION TIER — React SPA (Browser)</text>

  <!-- Client boxes -->
  <rect x="80" y="100" width="170" height="100" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="165" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">React Components</text>
  <text x="165" y="142" text-anchor="middle" font-size="10" fill="#64748b">Pages, Layout, Forms</text>

  <rect x="280" y="100" width="170" height="100" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="365" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">State &amp; Context</text>
  <text x="365" y="142" text-anchor="middle" font-size="10" fill="#64748b">AuthContext, API Layer</text>

  <rect x="480" y="100" width="170" height="100" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="565" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Styling</text>
  <text x="565" y="142" text-anchor="middle" font-size="10" fill="#64748b">Tailwind CSS, Lucide Icons</text>

  <rect x="680" y="100" width="140" height="100" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="750" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Routing</text>
  <text x="750" y="142" text-anchor="middle" font-size="10" fill="#64748b">React Router v6</text>

  <!-- Arrow down -->
  <line x1="450" y1="225" x2="450" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- ============= Application Tier ============= -->
  <rect x="50" y="260" width="800" height="180" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="70" y="285" font-size="14" font-weight="bold" fill="#059669">APPLICATION TIER — Express.js REST API (Node.js + TypeScript)</text>

  <rect x="80" y="300" width="140" height="120" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="150" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Auth Module</text>
  <text x="150" y="342" text-anchor="middle" font-size="10" fill="#64748b">Register, Login</text>
  <text x="150" y="358" text-anchor="middle" font-size="10" fill="#64748b">JWT Generation</text>

  <rect x="250" y="300" width="140" height="120" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="320" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Patients API</text>
  <text x="320" y="342" text-anchor="middle" font-size="10" fill="#64748b">CRUD + Search</text>
  <text x="320" y="358" text-anchor="middle" font-size="10" fill="#64748b">Pagination</text>

  <rect x="420" y="300" width="140" height="120" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="490" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Appointments API</text>
  <text x="490" y="342" text-anchor="middle" font-size="10" fill="#64748b">Schedule, Status</text>
  <text x="490" y="358" text-anchor="middle" font-size="10" fill="#64748b">Date Filtering</text>

  <rect x="590" y="300" width="140" height="120" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="660" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Medical Records</text>
  <text x="660" y="342" text-anchor="middle" font-size="10" fill="#64748b">Diagnosis</text>
  <text x="660" y="358" text-anchor="middle" font-size="10" fill="#64748b">Prescriptions</text>

  <!-- Arrow down -->
  <line x1="450" y1="445" x2="450" y2="470" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============= Data Tier ============= -->
  <rect x="50" y="480" width="800" height="120" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="70" y="505" font-size="14" font-weight="bold" fill="#6d28d9">DATA TIER — MongoDB (Mongoose ODM)</text>

  <rect x="80" y="520" width="170" height="60" rx="6" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="165" y="547" text-anchor="middle" font-size="11" font-weight="bold">Users</text>
  <text x="165" y="562" text-anchor="middle" font-size="10" fill="#64748b">Auth + Roles</text>

  <rect x="280" y="520" width="170" height="60" rx="6" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="365" y="547" text-anchor="middle" font-size="11" font-weight="bold">Patients</text>
  <text x="365" y="562" text-anchor="middle" font-size="10" fill="#64748b">Demographics + Medical</text>

  <rect x="480" y="520" width="170" height="60" rx="6" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="565" y="547" text-anchor="middle" font-size="11" font-weight="bold">Appointments</text>
  <text x="565" y="562" text-anchor="middle" font-size="10" fill="#64748b">Scheduling + Status</text>

  <rect x="680" y="520" width="140" height="60" rx="6" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="750" y="547" text-anchor="middle" font-size="11" font-weight="bold">MedicalRecords</text>
  <text x="750" y="562" text-anchor="middle" font-size="10" fill="#64748b">Diagnosis + Rx</text>

  <!-- Infrastructure bar at bottom -->
  <rect x="50" y="615" width="800" height="60" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="70" y="640" font-size="14" font-weight="bold" fill="#d97706">DEPLOYMENT INFRASTRUCTURE</text>

  <rect x="260" y="630" width="150" height="35" rx="4" fill="white" stroke="#f59e0b" stroke-width="1"/>
  <text x="335" y="652" text-anchor="middle" font-size="11" fill="#1e293b">Render (PaaS)</text>

  <rect x="440" y="630" width="150" height="35" rx="4" fill="white" stroke="#f59e0b" stroke-width="1"/>
  <text x="515" y="652" text-anchor="middle" font-size="11" fill="#1e293b">Docker Container</text>

  <rect x="620" y="630" width="150" height="35" rx="4" fill="white" stroke="#f59e0b" stroke-width="1"/>
  <text x="695" y="652" text-anchor="middle" font-size="11" fill="#1e293b">GitHub Actions CI</text>
</svg>
