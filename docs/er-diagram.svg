<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <text x="425" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">ClinicFlow — Entity Relationship Diagram</text>

  <!-- ===== User Entity ===== -->
  <rect x="40" y="55" width="240" height="160" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="40" y="55" width="240" height="30" rx="8" fill="#3b82f6"/>
  <rect x="40" y="75" width="240" height="10" fill="#3b82f6"/>
  <text x="160" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="white">User</text>
  <text x="55" y="105" font-size="11" fill="#475569">PK _id: ObjectId</text>
  <text x="55" y="122" font-size="11" fill="#475569">name: string *</text>
  <text x="55" y="139" font-size="11" fill="#475569">email: string * (unique)</text>
  <text x="55" y="156" font-size="11" fill="#475569">password: string * (hashed)</text>
  <text x="55" y="173" font-size="11" fill="#475569">role: enum(admin, doctor, receptionist)</text>
  <text x="55" y="190" font-size="11" fill="#475569">createdAt / updatedAt</text>

  <!-- ===== Patient Entity ===== -->
  <rect x="40" y="245" width="240" height="210" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <rect x="40" y="245" width="240" height="30" rx="8" fill="#10b981"/>
  <rect x="40" y="265" width="240" height="10" fill="#10b981"/>
  <text x="160" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Patient</text>
  <text x="55" y="295" font-size="11" fill="#475569">PK _id: ObjectId</text>
  <text x="55" y="312" font-size="11" fill="#475569">firstName / lastName: string *</text>
  <text x="55" y="329" font-size="11" fill="#475569">dateOfBirth: Date *</text>
  <text x="55" y="346" font-size="11" fill="#475569">gender: enum *</text>
  <text x="55" y="363" font-size="11" fill="#475569">phone: string *</text>
  <text x="55" y="380" font-size="11" fill="#475569">email: string</text>
  <text x="55" y="397" font-size="11" fill="#475569">bloodGroup: string</text>
  <text x="55" y="414" font-size="11" fill="#475569">allergies: string[]</text>
  <text x="55" y="431" font-size="11" fill="#475569">FK createdBy: ref → User</text>

  <!-- ===== Appointment Entity ===== -->
  <rect x="340" y="55" width="240" height="190" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <rect x="340" y="55" width="240" height="30" rx="8" fill="#f59e0b"/>
  <rect x="340" y="75" width="240" height="10" fill="#f59e0b"/>
  <text x="460" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Appointment</text>
  <text x="355" y="105" font-size="11" fill="#475569">PK _id: ObjectId</text>
  <text x="355" y="122" font-size="11" fill="#475569">date: Date *</text>
  <text x="355" y="139" font-size="11" fill="#475569">timeSlot: string *</text>
  <text x="355" y="156" font-size="11" fill="#475569">reason: string *</text>
  <text x="355" y="173" font-size="11" fill="#475569">status: enum *</text>
  <text x="355" y="190" font-size="11" fill="#475569">notes: string</text>
  <text x="355" y="207" font-size="11" fill="#475569">FK patient: ref → Patient *</text>
  <text x="355" y="224" font-size="11" fill="#475569">FK doctor: ref → User *</text>

  <!-- ===== MedicalRecord Entity ===== -->
  <rect x="340" y="280" width="240" height="175" rx="8" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="340" y="280" width="240" height="30" rx="8" fill="#8b5cf6"/>
  <rect x="340" y="300" width="240" height="10" fill="#8b5cf6"/>
  <text x="460" y="299" text-anchor="middle" font-size="13" font-weight="bold" fill="white">MedicalRecord</text>
  <text x="355" y="330" font-size="11" fill="#475569">PK _id: ObjectId</text>
  <text x="355" y="347" font-size="11" fill="#475569">diagnosis: string *</text>
  <text x="355" y="364" font-size="11" fill="#475569">prescription: string</text>
  <text x="355" y="381" font-size="11" fill="#475569">notes: string</text>
  <text x="355" y="398" font-size="11" fill="#475569">FK patient: ref → Patient *</text>
  <text x="355" y="415" font-size="11" fill="#475569">FK doctor: ref → User *</text>
  <text x="355" y="432" font-size="11" fill="#475569">FK appointment: ref → Appointment</text>

  <!-- Relationships -->
  <!-- Patient -> CreatedBy -> User -->
  <line x1="280" y1="380" x2="335" y2="130" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="295" y="205" font-size="10" fill="#64748b" transform="rotate(-55, 295, 205)">FK createdBy</text>

  <!-- Appointment -> Patient -->
  <line x1="280" y1="200" x2="335" y2="170" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="294" y="175" font-size="10" fill="#64748b" transform="rotate(-20, 294, 175)">FK patient</text>

  <!-- Appointment -> Doctor (User) -->
  <line x1="280" y1="185" x2="335" y2="135" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- MedicalRecord -> Patient -->
  <line x1="280" y1="380" x2="335" y2="380" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- MedicalRecord -> Appointment -->
  <line x1="460" y1="280" x2="460" y2="250" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Legend -->
  <rect x="610" y="55" width="200" height="100" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="710" y="75" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">Legend</text>
  <text x="625" y="95" font-size="10" fill="#475569">PK = Primary Key</text>
  <text x="625" y="112" font-size="10" fill="#475569">FK = Foreign Key (ref)</text>
  <text x="625" y="129" font-size="10" fill="#475569">* = Required field</text>
  <text x="625" y="146" font-size="10" fill="#475569">--→ Reference relationship</text>
</svg>
